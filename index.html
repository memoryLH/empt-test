<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="game-shell" aria-label="贪吃蛇游戏">
    <div class="scoreboard">
      <div id="scoreDisplay" class="score-item">分数: 0</div>
      <div id="highScoreDisplay" class="score-item">最高分: 0</div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="controls" aria-label="游戏控制">
      <button id="startBtn" type="button">开始游戏</button>
      <button id="pauseBtn" type="button">暂停</button>
      <button id="restartBtn" type="button">重新开始</button>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
